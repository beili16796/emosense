name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Check out EmoKit
        uses: actions/checkout@v4
        with:
          repository: beili16796/emokit
          path: external/emokit

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e external/emokit
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check emosense/ tests/

      - name: Run tests
        env:
          PYTHONPATH: external/emokit
        run: pytest tests/test_backend.py tests/test_file_parser.py tests/test_visualization.py -q
