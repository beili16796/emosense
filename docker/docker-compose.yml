version: '3.8'
services:
  emosense:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "7860:7860"
      - "8000:8000"
    volumes:
      # Mount datasets for testing:
      # - /path/to/datasets:/app/data
      # Mount real checkpoints when available:
      # - ./checkpoints:/app/checkpoints
      - emosense_results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
      - EMOKIT_DATA_ROOT=/app/data
    restart: unless-stopped

volumes:
  emosense_results:
